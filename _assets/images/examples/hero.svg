<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Hero Demo Image</title>
  <desc id="desc">Abstract hero artwork with gradient and circles.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b3d5c"/>
      <stop offset="100%" stop-color="#1c7c95"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="320" cy="280" r="170" fill="#f4d35e" opacity="0.85"/>
  <circle cx="1280" cy="670" r="230" fill="#ee964b" opacity="0.75"/>
  <rect x="220" y="590" width="900" height="90" rx="45" fill="#faf3dd" opacity="0.85"/>
  <text x="260" y="650" font-family="Arial, sans-serif" font-size="62" fill="#1c2a39">Hero Component Demo</text>
</svg>
